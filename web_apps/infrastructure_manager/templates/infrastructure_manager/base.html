<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Model Infrastructure Controls{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f5f5f7] text-zinc-900 antialiased min-h-screen font-sans tracking-tight overflow-y-scroll">

    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col space-y-3 max-w-sm w-full pointer-events-none">
        {% if messages %}
            {% for message in messages %}
                <div class="toast-card transform translate-y-4 opacity-0 transition-all duration-300 ease-out pointer-events-auto bg-white/90 backdrop-blur-xl p-4 rounded-xl border border-zinc-200/80 shadow-2xl flex items-start space-x-3.5 select-text">
                    
                    <span class="h-2 w-2 rounded-full mt-1.5 shrink-0 {% if message.tags == 'success' %}bg-emerald-500 shadow-[0_0_6px_#10b981]{% else %}bg-rose-500 shadow-[0_0_6px_#f43f5e]{% endif %}"></span>
                    
                    <div class="flex-1">
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] font-bold uppercase tracking-wider text-zinc-400">
                                {% if message.tags == 'success' %}System Success{% else %}Infrastructure Alert{% endif %}
                            </span>
                            <button onclick="dismissToast(this.closest('.toast-card'))" class="text-zinc-400 hover:text-zinc-600 font-sans text-sm font-semibold transition-colors cursor-pointer focus:outline-none leading-none">
                                &times;
                            </button>
                        </div>
                        <p class="text-xs font-medium text-zinc-700 mt-1 leading-normal tracking-tight">
                            {{ message }}
                        </p>
                    </div>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <header class="border-b border-zinc-200 bg-white/80 backdrop-blur-xl px-6 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center py-3">
            <div class="flex items-center space-x-4">
                <a href="{% url 'heatmap' %}" class="text-zinc-500 hover:text-[#0071e3] text-sm transition-colors">
                    ← Back
                </a>
                <span class="h-4 w-[1px] bg-zinc-200"></span>
                <h1 class="text-sm font-semibold text-zinc-800">Settings</h1>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-zinc-200 px-6 sticky top-[45px] z-30">
        <div class="max-w-6xl mx-auto flex space-x-8">
            <a href="{% url 'config_page' %}" class="py-3 text-sm transition-colors {% block config_tab_ui %}font-medium text-zinc-500 hover:text-zinc-800 border-b-2 border-transparent{% endblock %}">
                Model Configurations
            </a>
            <a href="{% url 'manage_models' %}" class="py-3 text-sm transition-colors {% block models_tab_ui %}font-medium text-zinc-500 hover:text-zinc-800 border-b-2 border-transparent{% endblock %}">
                Manage Models
            </a>
        </div>
    </div>

    <main class="{% block main_width %}max-w-6xl{% endblock %} mx-auto p-6 md:py-12 space-y-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        function dismissToast(toastCard) {
            if (!toastCard) return;
            toastCard.classList.add("opacity-0", "scale-95", "translate-y-[-4px]");
            setTimeout(() => toastCard.remove(), 300);
        }

        document.addEventListener("DOMContentLoaded", function() {
            const toasts = document.querySelectorAll(".toast-card");
            
            toasts.forEach((toast, index) => {
                setTimeout(() => {
                    toast.classList.remove("translate-y-4", "opacity-0");
                    toast.classList.add("translate-y-0", "opacity-100");
                }, index * 120);

                // FIXED: Popups now stay visible on screen for 15 seconds instead of 6.5
                setTimeout(() => {
                    dismissToast(toast);
                }, 15000);
            });
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
